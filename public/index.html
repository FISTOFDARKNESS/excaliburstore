<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura · Enaip Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0a0a;
      --surface: #111111;
      --border:  #222222;
      --accent:  #c8a96e;
      --text:    #e8e0d0;
      --muted:   #555;
      --radius:  4px;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      z-index: 200;
      flex-shrink: 0;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    .logo span { color: var(--muted); font-style: italic; }

    /* ── Nav tabs ── */
    nav {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }
    .tab {
      padding: 12px 24px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--muted);
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: color .2s, border-color .2s;
      text-transform: uppercase;
      background: none;
      border-top: none;
      border-left: none;
      border-right: none;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    /* ── Auth area ── */
    #auth-area { display: flex; align-items: center; gap: 12px; }
    .btn {
      padding: 7px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: var(--radius);
      transition: border-color .2s, color .2s, background .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary { border-color: var(--accent); color: var(--accent); }
    .btn.primary:hover { background: var(--accent); color: var(--bg); }
    .user-chip { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 11px; }
    .user-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); }

    /* ── Pages ── */
    .page { display: none; flex: 1; overflow: hidden; }
    .page.active { display: flex; flex-direction: column; }

    /* ══════════════════════════════════════
       PROXY PAGE
    ══════════════════════════════════════ */
    #page-proxy { flex-direction: column; }

    .proxy-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .proxy-bar .url-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 8px 14px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      outline: none;
      transition: border-color .2s;
    }
    .proxy-bar .url-input:focus { border-color: var(--accent); }
    .proxy-bar .url-input::placeholder { color: var(--muted); }
    .proxy-bar .go-btn {
      padding: 8px 20px;
      background: var(--accent);
      color: var(--bg);
      border: none;
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: opacity .2s;
      white-space: nowrap;
    }
    .proxy-bar .go-btn:hover { opacity: .85; }
    .proxy-bar .nav-btn {
      padding: 7px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: var(--radius);
      font-size: 14px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      line-height: 1;
    }
    .proxy-bar .nav-btn:hover { border-color: var(--accent); color: var(--accent); }

    #proxy-frame {
      flex: 1;
      border: none;
      background: #fff;
      width: 100%;
    }
    #proxy-placeholder {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--muted);
    }
    #proxy-placeholder .big { font-family: 'Cormorant Garamond', serif; font-size: 48px; color: var(--border); }
    #proxy-placeholder p { font-size: 12px; letter-spacing: 0.06em; }

    /* quick links */
    .quick-links {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 8px;
    }
    .quick-link {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      transition: border-color .2s, color .2s;
    }
    .quick-link:hover { border-color: var(--accent); color: var(--accent); }

    /* ══════════════════════════════════════
       GALLERY PAGE
    ══════════════════════════════════════ */
    #page-gallery { overflow-y: auto; }
    .gallery-inner { max-width: 1200px; margin: 0 auto; padding: 36px 32px; width: 100%; }

    #folders-section h2,
    #gallery-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      color: var(--accent);
    }
    #folders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 48px;
    }
    .folder-card {
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .folder-card:hover { border-color: var(--accent); background: #141414; }
    .folder-card.active { border-color: var(--accent); background: #151208; }
    .folder-card .folder-icon { font-size: 20px; margin-bottom: 10px; }
    .folder-card .folder-name { font-family: 'Cormorant Garamond', serif; font-size: 15px; letter-spacing: 0.04em; }
    .folder-card .folder-meta { color: var(--muted); font-size: 11px; margin-top: 4px; }

    #gallery-section { display: none; }
    #gallery-section h2 { font-size: 24px; margin-bottom: 8px; }
    .gallery-meta { color: var(--muted); font-size: 11px; margin-bottom: 20px; }

    #photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }
    .photo-card {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
    }
    .photo-card img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s ease; }
    .photo-card:hover img { transform: scale(1.05); }

    #upload-bar {
      display: none;
      margin-bottom: 24px;
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    #upload-bar label {
      display: flex; align-items: center; gap: 10px;
      cursor: pointer; color: var(--muted); font-size: 12px;
    }
    #upload-bar label:hover { color: var(--accent); }
    #upload-bar input[type="file"] { display: none; }
    #upload-status { margin-top: 10px; font-size: 11px; color: var(--accent); }

    /* ── Lightbox ── */
    #lightbox {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.92); z-index: 999;
      align-items: center; justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 90vw; max-height: 90vh; object-fit: contain; border-radius: var(--radius); }
    #lightbox-close {
      position: absolute; top: 20px; right: 28px;
      font-size: 28px; cursor: pointer; color: var(--muted);
      background: none; border: none; line-height: 1;
    }
    #lightbox-close:hover { color: var(--text); }

    .state-msg { color: var(--muted); font-size: 12px; padding: 40px 0; text-align: center; letter-spacing: 0.06em; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">aura <span>engine</span></div>
  <div id="auth-area">
    <a id="login-btn" class="btn primary" href="/api/auth/google">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign in with Google
    </a>
    <div id="user-info" style="display:none">
      <div class="user-chip"><span class="dot"></span><span id="user-name">—</span></div>
    </div>
    <button id="logout-btn" class="btn" style="display:none">Sign out</button>
  </div>
</header>

<nav>
  <button class="tab active" data-tab="proxy">🌐 Web Proxy</button>
  <button class="tab" data-tab="gallery">◫ Gallery</button>
</nav>

<!-- ══ PROXY PAGE ══ -->
<div id="page-proxy" class="page active">
  <div class="proxy-bar">
    <button class="nav-btn" id="proxy-back" title="Back">←</button>
    <button class="nav-btn" id="proxy-forward" title="Forward">→</button>
    <button class="nav-btn" id="proxy-reload" title="Reload">↺</button>
    <input class="url-input" id="proxy-url" type="text" placeholder="enter a URL  —  e.g. wikipedia.org" />
    <button class="go-btn" id="proxy-go">GO</button>
  </div>
  <div id="proxy-placeholder">
    <div class="big">◎</div>
    <p>type a URL above and press GO</p>
    <div class="quick-links">
      <div class="quick-link" data-url="wikipedia.org">Wikipedia</div>
      <div class="quick-link" data-url="news.ycombinator.com">Hacker News</div>
      <div class="quick-link" data-url="translate.google.com">Translate</div>
      <div class="quick-link" data-url="duckduckgo.com">DuckDuckGo</div>
      <div class="quick-link" data-url="archive.org">Archive.org</div>
    </div>
  </div>
  <iframe id="proxy-frame" style="display:none"></iframe>
</div>

<!-- ══ GALLERY PAGE ══ -->
<div id="page-gallery" class="page">
  <div class="gallery-inner">
    <section id="folders-section">
      <h2>Collections</h2>
      <div id="folders-grid"><p class="state-msg">loading collections…</p></div>
    </section>
    <section id="gallery-section">
      <button class="btn" id="back-btn" style="margin-bottom:20px">← back</button>
      <h2 id="gallery-title">—</h2>
      <p class="gallery-meta" id="gallery-meta">—</p>
      <div id="upload-bar">
        <label>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          click to upload image
          <input type="file" id="file-input" accept="image/*" multiple />
        </label>
        <div id="upload-status"></div>
      </div>
      <div id="photos-grid"><p class="state-msg">select a collection to view photos</p></div>
    </section>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">×</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  // ── Tabs ─────────────────────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('page-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Auth ─────────────────────────────────────────────────────────────────────
  let currentUser = null;
  let currentFolder = null;

  function loadUser() {
    try { const r = localStorage.getItem('aura_user'); if (r) currentUser = JSON.parse(r); } catch { currentUser = null; }
  }
  function renderAuth() {
    const show = !!currentUser;
    document.getElementById('login-btn').style.display  = show ? 'none' : 'inline-flex';
    document.getElementById('user-info').style.display  = show ? 'flex'  : 'none';
    document.getElementById('logout-btn').style.display = show ? 'inline-flex' : 'none';
    if (show) document.getElementById('user-name').textContent = currentUser.email;
  }
  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('aura_user');
    currentUser = null;
    renderAuth();
  });

  // ── Proxy ─────────────────────────────────────────────────────────────────────
  const urlInput    = document.getElementById('proxy-url');
  const frame       = document.getElementById('proxy-frame');
  const placeholder = document.getElementById('proxy-placeholder');
  let proxyHistory  = [];
  let proxyIndex    = -1;

  function navigate(url) {
    if (!url) return;
    if (!/^https?:\/\//i.test(url)) url = 'https://' + url;
    urlInput.value = url;
    const proxyUrl = '/proxy?url=' + encodeURIComponent(url);
    frame.src = proxyUrl;
    frame.style.display = 'block';
    placeholder.style.display = 'none';
    // history
    proxyHistory = proxyHistory.slice(0, proxyIndex + 1);
    proxyHistory.push(url);
    proxyIndex = proxyHistory.length - 1;
  }

  document.getElementById('proxy-go').addEventListener('click', () => navigate(urlInput.value.trim()));
  urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') navigate(urlInput.value.trim()); });

  document.getElementById('proxy-back').addEventListener('click', () => {
    if (proxyIndex > 0) { proxyIndex--; navigate(proxyHistory[proxyIndex]); }
  });
  document.getElementById('proxy-forward').addEventListener('click', () => {
    if (proxyIndex < proxyHistory.length - 1) { proxyIndex++; navigate(proxyHistory[proxyIndex]); }
  });
  document.getElementById('proxy-reload').addEventListener('click', () => {
    if (proxyIndex >= 0) navigate(proxyHistory[proxyIndex]);
  });

  document.querySelectorAll('.quick-link').forEach(el => {
    el.addEventListener('click', () => navigate(el.dataset.url));
  });

  // ── Folders ──────────────────────────────────────────────────────────────────
  async function loadFolders() {
    const grid = document.getElementById('folders-grid');
    try {
      const folders = await (await fetch('/api/folders')).json();
      if (!folders.length) { grid.innerHTML = '<p class="state-msg">no collections yet</p>'; return; }
      grid.innerHTML = folders.map(f => `
        <div class="folder-card" data-id="${f.id}" data-name="${f.name}" data-creator="${f.allowedCreator}">
          <div class="folder-icon">◫</div>
          <div class="folder-name">${f.name}</div>
          <div class="folder-meta">${f.allowedCreator}</div>
        </div>`).join('');
      grid.querySelectorAll('.folder-card').forEach(c => c.addEventListener('click', () => openFolder(c.dataset)));
    } catch { grid.innerHTML = '<p class="state-msg">failed to load collections</p>'; }
  }

  async function openFolder({ id, name, creator }) {
    currentFolder = { id, name, creator };
    document.getElementById('folders-section').style.display = 'none';
    document.getElementById('gallery-section').style.display = 'block';
    document.getElementById('gallery-title').textContent = name;
    document.getElementById('gallery-meta').textContent  = `managed by ${creator}`;
    document.getElementById('upload-bar').style.display  = (currentUser && currentUser.email === creator) ? 'block' : 'none';
    loadPhotos(id);
  }

  async function loadPhotos(folderId) {
    const grid = document.getElementById('photos-grid');
    grid.innerHTML = '<p class="state-msg">loading…</p>';
    try {
      const photos = await (await fetch(`/api/photos?folderId=${folderId}`)).json();
      if (!photos.length) { grid.innerHTML = '<p class="state-msg">no photos in this collection</p>'; return; }
      grid.innerHTML = photos.map(url => `<div class="photo-card"><img src="${url}" loading="lazy" alt="" /></div>`).join('');
      grid.querySelectorAll('.photo-card img').forEach(img => img.addEventListener('click', () => openLightbox(img.src)));
    } catch { grid.innerHTML = '<p class="state-msg">failed to load photos</p>'; }
  }

  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('gallery-section').style.display = 'none';
    document.getElementById('folders-section').style.display = 'block';
    currentFolder = null;
  });

  // ── Upload ───────────────────────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files);
    const status = document.getElementById('upload-status');
    if (!files.length || !currentFolder) return;
    for (const file of files) {
      status.textContent = `uploading ${file.name}…`;
      const base64  = await new Promise((res, rej) => { const r = new FileReader(); r.onload = () => res(r.result); r.onerror = rej; r.readAsDataURL(file); });
      const content = base64.split(',')[1];
      try {
        const res = await fetch('/api/upload', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ folderId: currentFolder.id, filename: file.name, content }) });
        status.textContent = res.ok ? `✓ ${file.name} uploaded` : `✗ failed: ${await res.text()}`;
      } catch (err) { status.textContent = `✗ error: ${err.message}`; }
    }
    e.target.value = '';
    setTimeout(() => { status.textContent = ''; loadPhotos(currentFolder.id); }, 1500);
  });

  // ── Lightbox ─────────────────────────────────────────────────────────────────
  function openLightbox(src) { document.getElementById('lightbox-img').src = src; document.getElementById('lightbox').classList.add('open'); }
  document.getElementById('lightbox-close').addEventListener('click', () => document.getElementById('lightbox').classList.remove('open'));
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) e.currentTarget.classList.remove('open'); });

  // ── Init ─────────────────────────────────────────────────────────────────────
  loadUser();
  renderAuth();
  loadFolders();
</script>
</body>
    </html>
