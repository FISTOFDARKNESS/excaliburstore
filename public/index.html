<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aura · Enaip Gallery</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0a0a;
      --surface: #111111;
      --border:  #222222;
      --accent:  #c8a96e;
      --text:    #e8e0d0;
      --muted:   #555;
      --radius:  4px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
      z-index: 100;
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 0.12em;
      color: var(--accent);
    }
    .logo span { color: var(--muted); font-style: italic; }

    #auth-area {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .btn {
      padding: 7px 16px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.06em;
      cursor: pointer;
      border-radius: var(--radius);
      transition: border-color .2s, color .2s;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn.primary {
      border-color: var(--accent);
      color: var(--accent);
    }
    .btn.primary:hover { background: var(--accent); color: var(--bg); }

    /* ── Layout ── */
    main { max-width: 1200px; margin: 0 auto; padding: 40px 32px; }

    /* ── Folders ── */
    #folders-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 0.05em;
      margin-bottom: 24px;
      color: var(--accent);
    }

    #folders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      margin-bottom: 48px;
    }

    .folder-card {
      border: 1px solid var(--border);
      padding: 20px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .folder-card:hover {
      border-color: var(--accent);
      background: #141414;
    }
    .folder-card.active { border-color: var(--accent); background: #151208; }
    .folder-card .folder-icon { font-size: 20px; margin-bottom: 10px; }
    .folder-card .folder-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      letter-spacing: 0.04em;
    }
    .folder-card .folder-meta { color: var(--muted); font-size: 11px; margin-top: 4px; }

    /* ── Gallery ── */
    #gallery-section { display: none; }
    #gallery-section h2 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 24px;
      font-weight: 300;
      margin-bottom: 8px;
      color: var(--accent);
    }
    #gallery-section .gallery-meta {
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 20px;
    }

    #photos-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 8px;
    }

    .photo-card {
      aspect-ratio: 1;
      overflow: hidden;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      cursor: pointer;
      position: relative;
    }
    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: transform .4s ease;
    }
    .photo-card:hover img { transform: scale(1.05); }

    /* ── Upload bar ── */
    #upload-bar {
      display: none;
      margin-bottom: 24px;
      padding: 16px;
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      background: var(--surface);
    }
    #upload-bar label {
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      color: var(--muted);
      font-size: 12px;
    }
    #upload-bar label:hover { color: var(--accent); }
    #upload-bar input[type="file"] { display: none; }
    #upload-status { margin-top: 10px; font-size: 11px; color: var(--accent); }

    /* ── Lightbox ── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.92);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }
    #lightbox.open { display: flex; }
    #lightbox img {
      max-width: 90vw;
      max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius);
    }
    #lightbox-close {
      position: absolute;
      top: 20px; right: 28px;
      font-size: 28px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      line-height: 1;
    }
    #lightbox-close:hover { color: var(--text); }

    /* ── Empty / Loading ── */
    .state-msg {
      color: var(--muted);
      font-size: 12px;
      padding: 40px 0;
      text-align: center;
      letter-spacing: 0.06em;
    }

    /* ── User chip ── */
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 11px;
    }
    .user-chip .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="logo">aura <span>engine</span></div>
  <div id="auth-area">
    <a id="login-btn" class="btn primary" href="/api/auth/google">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Sign in with Google
    </a>
    <div id="user-info" style="display:none">
      <div class="user-chip">
        <span class="dot"></span>
        <span id="user-name">—</span>
      </div>
    </div>
    <button id="logout-btn" class="btn" style="display:none">Sign out</button>
  </div>
</header>

<main>
  <!-- Folders -->
  <section id="folders-section">
    <h2>Collections</h2>
    <div id="folders-grid"><p class="state-msg">loading collections…</p></div>
  </section>

  <!-- Gallery -->
  <section id="gallery-section">
    <button class="btn" id="back-btn" style="margin-bottom:20px">← back</button>
    <h2 id="gallery-title">—</h2>
    <p class="gallery-meta" id="gallery-meta">—</p>

    <div id="upload-bar">
      <label>
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        click to upload image
        <input type="file" id="file-input" accept="image/*" multiple />
      </label>
      <div id="upload-status"></div>
    </div>

    <div id="photos-grid"><p class="state-msg">select a collection to view photos</p></div>
  </section>
</main>

<!-- Lightbox -->
<div id="lightbox">
  <button id="lightbox-close">×</button>
  <img id="lightbox-img" src="" alt="" />
</div>

<script>
  // ── Auth state ──────────────────────────────────────────────────────────────
  let currentUser = null;
  let currentFolder = null;

  function loadUser() {
    try {
      const raw = localStorage.getItem('aura_user');
      if (raw) currentUser = JSON.parse(raw);
    } catch { currentUser = null; }
  }

  function renderAuth() {
    const loginBtn  = document.getElementById('login-btn');
    const userInfo  = document.getElementById('user-info');
    const logoutBtn = document.getElementById('logout-btn');
    const userName  = document.getElementById('user-name');

    if (currentUser) {
      loginBtn.style.display  = 'none';
      userInfo.style.display  = 'flex';
      logoutBtn.style.display = 'inline-flex';
      userName.textContent    = currentUser.email;
    } else {
      loginBtn.style.display  = 'inline-flex';
      userInfo.style.display  = 'none';
      logoutBtn.style.display = 'none';
    }
  }

  document.getElementById('logout-btn').addEventListener('click', () => {
    localStorage.removeItem('aura_user');
    currentUser = null;
    renderAuth();
  });

  // ── Folders ─────────────────────────────────────────────────────────────────
  async function loadFolders() {
    const grid = document.getElementById('folders-grid');
    try {
      const res     = await fetch('/api/folders');
      const folders = await res.json();
      if (!folders.length) {
        grid.innerHTML = '<p class="state-msg">no collections yet</p>';
        return;
      }
      grid.innerHTML = folders.map(f => `
        <div class="folder-card" data-id="${f.id}" data-name="${f.name}" data-creator="${f.allowedCreator}">
          <div class="folder-icon">◫</div>
          <div class="folder-name">${f.name}</div>
          <div class="folder-meta">${f.allowedCreator}</div>
        </div>
      `).join('');
      grid.querySelectorAll('.folder-card').forEach(card => {
        card.addEventListener('click', () => openFolder(card.dataset));
      });
    } catch {
      grid.innerHTML = '<p class="state-msg">failed to load collections</p>';
    }
  }

  // ── Gallery ─────────────────────────────────────────────────────────────────
  async function openFolder({ id, name, creator }) {
    currentFolder = { id, name, creator };

    document.getElementById('folders-section').style.display = 'none';
    const sec = document.getElementById('gallery-section');
    sec.style.display = 'block';

    document.getElementById('gallery-title').textContent = name;
    document.getElementById('gallery-meta').textContent  = `managed by ${creator}`;

    // Show upload only for authorised user
    const uploadBar = document.getElementById('upload-bar');
    if (currentUser && currentUser.email === creator) {
      uploadBar.style.display = 'block';
    } else {
      uploadBar.style.display = 'none';
    }

    loadPhotos(id);
  }

  async function loadPhotos(folderId) {
    const grid = document.getElementById('photos-grid');
    grid.innerHTML = '<p class="state-msg">loading…</p>';
    try {
      const res    = await fetch(`/api/photos?folderId=${folderId}`);
      const photos = await res.json();
      if (!photos.length) {
        grid.innerHTML = '<p class="state-msg">no photos in this collection</p>';
        return;
      }
      grid.innerHTML = photos.map(url => `
        <div class="photo-card">
          <img src="${url}" loading="lazy" alt="" />
        </div>
      `).join('');
      grid.querySelectorAll('.photo-card img').forEach(img => {
        img.addEventListener('click', () => openLightbox(img.src));
      });
    } catch {
      grid.innerHTML = '<p class="state-msg">failed to load photos</p>';
    }
  }

  document.getElementById('back-btn').addEventListener('click', () => {
    document.getElementById('gallery-section').style.display = 'none';
    document.getElementById('folders-section').style.display = 'block';
    currentFolder = null;
  });

  // ── Upload ──────────────────────────────────────────────────────────────────
  document.getElementById('file-input').addEventListener('change', async (e) => {
    const files  = Array.from(e.target.files);
    const status = document.getElementById('upload-status');
    if (!files.length || !currentFolder) return;

    for (const file of files) {
      status.textContent = `uploading ${file.name}…`;
      const base64 = await toBase64(file);
      const content = base64.split(',')[1];
      try {
        const res = await fetch('/api/upload', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ folderId: currentFolder.id, filename: file.name, content })
        });
        if (res.ok) {
          status.textContent = `✓ ${file.name} uploaded`;
        } else {
          status.textContent = `✗ failed: ${await res.text()}`;
        }
      } catch (err) {
        status.textContent = `✗ error: ${err.message}`;
      }
    }
    e.target.value = '';
    setTimeout(() => { status.textContent = ''; loadPhotos(currentFolder.id); }, 1500);
  });

  function toBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload  = () => resolve(reader.result);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  // ── Lightbox ─────────────────────────────────────────────────────────────────
  function openLightbox(src) {
    document.getElementById('lightbox-img').src = src;
    document.getElementById('lightbox').classList.add('open');
  }
  document.getElementById('lightbox-close').addEventListener('click', () => {
    document.getElementById('lightbox').classList.remove('open');
  });
  document.getElementById('lightbox').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
  });

  // ── Init ────────────────────────────────────────────────────────────────────
  loadUser();
  renderAuth();
  loadFolders();
</script>
</body>
</html>
